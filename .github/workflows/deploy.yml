name: Deploy site (+ weekly airzones refresh)

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # every Monday 06:00 UTC

permissions:
  contents: write # commit refreshed airzones data back to the repo
  pages: write # deploy to GitHub Pages
  id-token: write # OIDC token for deploy-pages

# Never run two Pages deployments at once; let an in-flight one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # Refresh CAA airzones only on schedule/manual runs (not on every push → don't hammer caa.bg).
      # continue-on-error: a caa.bg hiccup must never block deploying the last-good data.
      - name: Refresh CAA data (ED-269 + airzones)
        if: github.event_name != 'push'
        continue-on-error: true
        run: |
          node bin/fetch-ed269.mjs
          node bin/fetch-airzones.mjs

      - name: Commit refreshed data if changed
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add airzones ed269
          if git diff --cached --quiet; then
            echo "No airzones changes."
          else
            git commit -m "chore: refresh CAA airzones data [automated]"
            git push
          fi

      # Stage only what the live site serves (keeps .git/bin/worker/snapshots out of the published artifact).
      - name: Stage site
        run: |
          mkdir -p _site/airzones _site/ed269
          cp index.html _site/
          cp airzones/all.geojson _site/airzones/
          cp ed269/latest.zip _site/ed269/

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
