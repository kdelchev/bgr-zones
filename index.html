<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BGR Drone Zones (ED-269)</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"
  integrity="sha384-DT0Ls0mO7JmjTnT+oBuMhEJzYJO1zUqzuuMXNdnOmOQRIpN2BgSjvBV/j50NngIT" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; height: 100%; font: 14px/1.4 system-ui, sans-serif; }
  #bar {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 8px 12px; background: #1f2937; color: #fff; box-shadow: 0 1px 4px #0005;
  }
  #bar b { font-size: 15px; }
  #bar #status { color: #cbd5e1; flex: 1 1 220px; min-width: 160px; }
  #bar.error #status { color: #fca5a5; }
  #bar button, #bar label.btn {
    background: #374151; color: #fff; border: 1px solid #4b5563; border-radius: 5px;
    padding: 5px 10px; cursor: pointer; font: inherit;
  }
  #bar button:hover, #bar label.btn:hover { background: #4b5563; }
  #bar a { color: #93c5fd; }
  #map { height: calc(100% - 49px); }
  #drophint {
    position: absolute; inset: 49px 0 0 0; display: none; z-index: 1000;
    align-items: center; justify-content: center; pointer-events: none;
    background: #1f2937cc; color: #fff; font-size: 20px;
  }
  body.dragging #drophint { display: flex; }
  .legend { background: #fff; padding: 8px 10px; border-radius: 6px; box-shadow: 0 1px 4px #0003; }
  .legend b { display: block; margin-bottom: 4px; }
  .legend .warn { color: #b45309; margin-top: 4px; font-size: 12px; }
</style>
</head>
<body>
<div id="bar">
  <b>BGR Drone Zones — ED-269</b>
  <span id="status">Starting…</span>
  <button id="reload" title="Re-fetch the latest file">Reload latest</button>
  <label class="btn">Open file…<input id="file" type="file" accept=".zip,.json" hidden></label>
  <a href="https://www.caa.bg/bg/category/633/7062" target="_blank" rel="noopener">CAA ED‑269 ↗</a>
  <a href="https://www.caa.bg/bg/category/745" target="_blank" rel="noopener">CAA airzones ↗</a>
</div>
<div id="map"></div>
<div id="drophint">Drop a .zip or .json file to visualize</div>

<script>
"use strict";

// --- Static data sources (same-origin, built weekly by bin/fetch-*.mjs). Drop a custom file to override. ---
const ED269_URL = "ed269/latest.zip"; // latest ED-269 drone zones (zip; unzipped in-browser)

// --- ED-269 restriction → color (warm severity ramp) ---
const COLORS = { PROHIBITED: "#d7191c", REQ_AUTHORISATION: "#fdae61", CONDITIONAL: "#f7e043" };
const colorFor = (r) => COLORS[r] || "#3388ff";

// --- CAA airzone type → {label, color} (cool/qualitative palette, distinct from ED-269) ---
const AIRZONE_TYPES = [
  { key: "Зони за сигурност", label: "Security", color: "#7c3aed" },
  { key: "Зони ограничени около летища", label: "Airport — restricted", color: "#2563eb" },
  { key: "Зони за безопасност около летищата", label: "Airport — safety", color: "#0891b2" },
  { key: "Зоните за координация", label: "Coordination", color: "#15803d" },
  { key: "Зони за околна среда", label: "Environmental", color: "#be185d" },
];
const AIRZONE_BY_KEY = Object.fromEntries(AIRZONE_TYPES.map((t) => [t.key, t]));
const colorForAirzone = (type) => (AIRZONE_BY_KEY[type] || { color: "#64748b" }).color;
const AIRZONES_URL = "airzones/all.geojson"; // same-origin static file (built by bin/fetch-airzones.mjs)

// --- Coordinate sanity: Bulgaria + neighbors box. Fix lat/lon transpositions; flag true outliers. ---
const inBox = (lon, lat) => lon >= 21 && lon <= 30 && lat >= 40.5 && lat <= 45;

const escapeHtml = (s) => String(s)
  .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");

// Parse an ED-269 document into render-ready zones (Leaflet [lat,lon] order).
function normalize(raw) {
  const features = Array.isArray(raw.features) ? raw.features : [];
  const zones = [];
  const corrected = new Set();
  const outliers = new Set();
  const fix = (lon, lat, id) => {
    if (inBox(lon, lat)) return [lon, lat];
    if (inBox(lat, lon)) { corrected.add(id); return [lat, lon]; }
    outliers.add(id);
    return [lon, lat];
  };
  for (const f of features) {
    const g = f.geometry && f.geometry[0];
    const hp = g && g.horizontalProjection;
    if (!hp) continue;
    const z = {
      identifier: f.identifier || "", name: f.name || "", type: f.type || "",
      restriction: f.restriction || "", reason: Array.isArray(f.reason) ? f.reason : [],
      otherReasonInfo: f.otherReasonInfo || "", uSpaceClass: f.uSpaceClass || "",
      message: f.message || "", lowerLimit: g.lowerLimit, upperLimit: g.upperLimit,
      lowerRef: g.lowerVerticalReference || "", upperRef: g.upperVerticalReference || "",
      uom: g.uomDimensions || "M", color: colorFor(f.restriction),
      applicability: Array.isArray(f.applicability) ? f.applicability : [],
      regulationExemption: f.regulationExemption || "",
      zoneAuthority: Array.isArray(f.zoneAuthority) ? f.zoneAuthority : [],
    };
    if (hp.type === "Circle" && Array.isArray(hp.center)) {
      const [lon, lat] = fix(hp.center[0], hp.center[1], z.identifier);
      zones.push({ ...z, shape: "circle", lat, lon, radius: hp.radius });
    } else if (hp.type === "Polygon" && Array.isArray(hp.coordinates)) {
      const rings = hp.coordinates.map((ring) =>
        ring.map(([lon, lat]) => { const p = fix(lon, lat, z.identifier); return [p[1], p[0]]; }));
      zones.push({ ...z, shape: "polygon", rings });
    }
  }
  return { zones, corrected: [...corrected], outliers: [...outliers], title: raw.title || "BGR zones" };
}

function fmtApplicability(app) {
  if (!Array.isArray(app) || !app.length) return "";
  return app.map((a) => a.permanent === "YES"
    ? "Permanent"
    : [a.startDateTime, a.endDateTime].filter(Boolean).join(" → ")).filter(Boolean).join("; ");
}

// CAA airzones (2nd layer): a GeoJSON FeatureCollection with {id,title,type,source} props.
// Geometry is Polygon/MultiPolygon (most) or LineString/MultiLineString (the Зона-Д series).
function normalizeAirzones(fc) {
  const polygons = [], lines = [];
  for (const f of (fc.features || [])) {
    const g = f.geometry;
    const p = f.properties || {};
    if (!g) continue;
    const type = p.type || "";
    const base = {
      dataset: "airzones", id: p.id || "", title: p.title || p.name || "", type,
      source: p.source || "", color: colorForAirzone(type),
    };
    if (g.type === "Polygon" || g.type === "MultiPolygon") {
      const polys = g.type === "Polygon" ? [g.coordinates] : g.coordinates;
      for (const poly of polys) {
        polygons.push({ ...base, shape: "polygon", rings: poly.map((ring) => ring.map(([lon, lat]) => [lat, lon])) });
      }
    } else if (g.type === "LineString" || g.type === "MultiLineString") {
      const segs = g.type === "LineString" ? [g.coordinates] : g.coordinates;
      for (const seg of segs) lines.push({ ...base, shape: "line", latlngs: seg.map(([lon, lat]) => [lat, lon]) });
    }
  }
  return { polygons, lines };
}

function airzonePopupHtml(z) {
  const rows = [["ID", z.id], ["Name", z.title], ["Type", z.type]]
    .filter((r) => r[1] !== "" && r[1] != null)
    .map(([k, v]) => `<tr><th style="text-align:left;padding-right:8px">${escapeHtml(k)}</th><td>${escapeHtml(v)}</td></tr>`)
    .join("");
  const src = z.source
    ? `<div style="margin-top:4px"><a href="${escapeHtml(z.source)}" target="_blank" rel="noopener">CAA page ↗</a></div>` : "";
  return `<table style="font:12px/1.4 system-ui,sans-serif;max-width:320px">${rows}</table>${src}`;
}

function popupHtml(z) {
  if (z.dataset === "airzones") return airzonePopupHtml(z);
  const band = z.lowerLimit != null && z.upperLimit != null
    ? `${z.lowerLimit}–${z.upperLimit} ${z.uom} (${z.lowerRef || "?"}→${z.upperRef || "?"})` : "";
  const za = (z.zoneAuthority && z.zoneAuthority[0]) || null;
  const rows = [
    ["ID", z.identifier], ["Name", z.name], ["Type", z.type], ["Restriction", z.restriction],
    ["Reason", z.reason.join(", ")], ["Other", z.otherReasonInfo], ["U-space", z.uSpaceClass],
    ["Vertical", band], z.shape === "circle" ? ["Radius", `${z.radius} m`] : null,
    ["Applicability", fmtApplicability(z.applicability)], ["Reg. exemption", z.regulationExemption],
    za ? ["Authority", [za.name, za.purpose].filter(Boolean).join(" · ")] : null,
    za ? ["Contact", za.contactName] : null, za ? ["Email", za.email] : null,
    za ? ["Phone", za.phone] : null, za ? ["Notify before", za.intervalBefore] : null,
    ["Message", z.message],
  ].filter((r) => r && r[1] !== "" && r[1] != null);
  const trs = rows.map(([k, v]) =>
    `<tr><th style="text-align:left;padding-right:8px;vertical-align:top;white-space:nowrap">${escapeHtml(k)}</th><td>${escapeHtml(v)}</td></tr>`).join("");
  return `<table style="font:12px/1.4 system-ui,sans-serif;max-width:320px">${trs}</table>`;
}

// --- Map setup ---
// preferCanvas: draw the ~1,183 vectors on a canvas (much faster than SVG for this many).
const map = L.map("map", { preferCanvas: true }).setView([42.7, 25.3], 7);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19, attribution: "&copy; OpenStreetMap contributors",
}).addTo(map);

let activeGroups = [];
let controlEl = null;         // custom grouped layer-toggle + legend control
let currentZones = [];        // ED-269 zones, for click hit-testing across overlapping zones
let restrictionGroups = {};   // restriction -> LayerGroup
let ed269Counts = {};
let ed269Meta = null;         // { title, total, corrected, outliers }
let airzoneZones = [];        // CAA airzone POLYGONS (in the unified click hit-test)
let airzoneLines = [];        // CAA airzone LINEs (own popups)
let airzoneGroups = {};       // type-key -> LayerGroup (one per airzone type)
let airzoneCounts = {};       // type-key -> count
const airzoneTotal = () => Object.values(airzoneCounts).reduce((a, b) => a + b, 0);

function setStatus(text, isError) {
  document.getElementById("status").textContent = text;
  document.getElementById("bar").classList.toggle("error", !!isError);
}

// Ray-casting point-in-ring (ring = [[lat,lon],...]; x=lon, y=lat).
function pointInRing(lat, lng, ring) {
  let inside = false;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const yi = ring[i][0], xi = ring[i][1], yj = ring[j][0], xj = ring[j][1];
    if (((yi > lat) !== (yj > lat)) && (lng < ((xj - xi) * (lat - yi)) / (yj - yi) + xi)) inside = !inside;
  }
  return inside;
}
function zoneContains(z, latlng) {
  if (z.shape === "circle") return map.distance(latlng, L.latLng(z.lat, z.lon)) <= z.radius;
  let inside = false; // even-odd across rings (handles polygon holes)
  for (const ring of z.rings) if (pointInRing(latlng.lat, latlng.lng, ring)) inside = !inside;
  return inside;
}
const zoneVisible = (z) => {
  const g = z.dataset === "airzones" ? airzoneGroups[z.type] : restrictionGroups[z.restriction];
  return !!g && map.hasLayer(g);
};

function aggregatePopupHtml(zs) {
  const blocks = zs.map((z, i) => {
    const sep = i ? "border-top:1px solid #ddd;margin-top:8px;padding-top:8px;" : "";
    const sw = `<span style="display:inline-block;width:10px;height:10px;background:${z.color};border:1px solid #0006;border-radius:2px;margin-right:5px;vertical-align:middle"></span>`;
    const tag = z.dataset === "airzones" ? "CAA airzone" : "ED‑269";
    return `<div style="${sep}"><div style="font-weight:600;font-size:12px;color:#374151;margin-bottom:2px">${sw}#${i + 1} of ${zs.length} · ${tag}</div>${popupHtml(z)}</div>`;
  }).join("");
  return `<div style="max-height:340px;overflow:auto"><div style="font-weight:600;margin-bottom:6px">${zs.length} overlapping zones here — scroll for all</div>${blocks}</div>`;
}

// On any zone click, find every visible zone covering that point (both layers) and show them together.
function onZoneClick(e) {
  const hits = [...currentZones, ...airzoneZones].filter((z) => zoneVisible(z) && zoneContains(z, e.latlng));
  if (!hits.length) return;
  const html = hits.length === 1 ? popupHtml(hits[0]) : aggregatePopupHtml(hits);
  L.popup({ maxWidth: 360, autoPan: true }).setLatLng(e.latlng).setContent(html).openOn(map);
}

function render(rawEd269) {
  const { zones, corrected, outliers, title } = normalize(rawEd269);
  if (!zones.length) throw new Error("No drawable zones found in this file");

  // Clear any previous render.
  activeGroups.forEach((g) => map.removeLayer(g));
  activeGroups = [];

  const groups = {};
  const counts = {};
  let minLat = 90, maxLat = -90, minLon = 180, maxLon = -180;
  const ext = (la, lo) => {
    if (la < minLat) minLat = la; if (la > maxLat) maxLat = la;
    if (lo < minLon) minLon = lo; if (lo > maxLon) maxLon = lo;
  };

  for (const z of zones) {
    counts[z.restriction] = (counts[z.restriction] || 0) + 1;
    const style = { color: z.color, weight: 1, fillColor: z.color, fillOpacity: 0.35 };
    let layer;
    if (z.shape === "circle") {
      layer = L.circle([z.lat, z.lon], { radius: z.radius, ...style });
      const dLat = z.radius / 111320;
      const dLon = z.radius / (111320 * Math.cos((z.lat * Math.PI) / 180));
      ext(z.lat - dLat, z.lon - dLon); ext(z.lat + dLat, z.lon + dLon);
    } else {
      layer = L.polygon(z.rings, style);
      for (const ring of z.rings) for (const [la, lo] of ring) ext(la, lo);
    }
    layer.on("click", onZoneClick); // aggregate popup handles overlaps
    (groups[z.restriction] = groups[z.restriction] || L.layerGroup().addTo(map)).addLayer(layer);
  }

  currentZones = zones;
  restrictionGroups = groups;
  ed269Counts = counts;
  ed269Meta = { title, total: zones.length, corrected, outliers };
  activeGroups = Object.values(groups);
  map.fitBounds([[minLat, minLon], [maxLat, maxLon]], { padding: [20, 20] });
  rebuildControl();

  let msg = `${title} — ${zones.length} zones`;
  if (corrected.length) msg += ` · fixed ${corrected.length} transposed`;
  if (outliers.length) msg += ` · ${outliers.length} out-of-region (kept)`;
  setStatus(msg, false);
}

// Two-section list: each item = one toggleable LayerGroup with its color + count (doubles as legend).
function controlSections() {
  const ed = Object.keys(COLORS)
    .filter((r) => restrictionGroups[r])
    .map((r) => ({ label: r, color: COLORS[r], count: ed269Counts[r] || 0, group: restrictionGroups[r] }));
  const az = AIRZONE_TYPES
    .filter((t) => airzoneGroups[t.key])
    .map((t) => ({ label: t.label, color: t.color, count: airzoneCounts[t.key] || 0, group: airzoneGroups[t.key] }));
  return [
    { title: `CAA ED‑269${ed269Meta ? ` (${ed269Meta.total})` : ""}`, items: ed },
    { title: `CAA airzones${airzoneTotal() ? ` (${airzoneTotal()})` : ""}`, items: az },
  ];
}

// Custom grouped control (top-right) = layer toggles + legend in one panel. Rebuilt as each layer loads.
function rebuildControl() {
  if (controlEl) map.removeControl(controlEl);
  controlEl = L.control({ position: "topright" });
  controlEl.onAdd = () => {
    const root = L.DomUtil.create("div", "legend layerctl");
    L.DomEvent.disableClickPropagation(root);
    L.DomEvent.disableScrollPropagation(root);
    const sections = controlSections();
    for (const sec of sections) {
      if (!sec.items.length) continue;
      const rows = [];
      const head = L.DomUtil.create("div", "", root);
      head.style.cssText = "font-weight:600;margin:6px 0 2px";
      const master = document.createElement("input");
      master.type = "checkbox";
      master.style.marginRight = "6px";
      const onCount = () => sec.items.filter((it) => map.hasLayer(it.group)).length;
      const syncMaster = () => {
        const n = onCount();
        master.checked = n === sec.items.length;
        master.indeterminate = n > 0 && n < sec.items.length;
      };
      master.addEventListener("change", () => {
        sec.items.forEach((it, i) => {
          if (master.checked) map.addLayer(it.group); else map.removeLayer(it.group);
          rows[i].checked = master.checked;
        });
        master.indeterminate = false;
      });
      head.append(master, document.createTextNode(sec.title));
      for (const it of sec.items) {
        const row = L.DomUtil.create("label", "", root);
        row.style.cssText = "display:block;margin-left:2px;cursor:pointer";
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = map.hasLayer(it.group);
        cb.style.marginRight = "6px";
        cb.addEventListener("change", () => {
          if (cb.checked) map.addLayer(it.group); else map.removeLayer(it.group);
          syncMaster();
        });
        rows.push(cb);
        const sw = document.createElement("span");
        sw.style.cssText = `display:inline-block;width:12px;height:12px;background:${it.color};border:1px solid #0006;margin-right:6px;vertical-align:middle`;
        row.append(cb, sw, document.createTextNode(`${it.label} (${it.count})`));
      }
      syncMaster();
    }
    if (ed269Meta && (ed269Meta.corrected.length || ed269Meta.outliers.length)) {
      const w = L.DomUtil.create("div", "warn", root);
      if (ed269Meta.corrected.length) w.append(`Fixed transposition: ${ed269Meta.corrected.join(", ")}`, document.createElement("br"));
      if (ed269Meta.outliers.length) w.append(`Out-of-region (verify): ${ed269Meta.outliers.join(", ")}`);
    }
    if (!sections.some((s) => s.items.length)) root.textContent = "Loading…";
    return root;
  };
  controlEl.addTo(map);
}

// Load + render the CAA airzones layer (independent of the ED-269 load). On by default.
async function loadAirzones() {
  try {
    const res = await fetch(AIRZONES_URL, { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const norm = normalizeAirzones(await res.json());
    airzoneZones = norm.polygons;
    airzoneLines = norm.lines;
    renderAirzones();
  } catch (e) {
    console.warn(`CAA airzones layer not loaded (${e.message}). Expected at ${AIRZONES_URL}.`);
  }
}

function renderAirzones() {
  Object.values(airzoneGroups).forEach((g) => map.removeLayer(g));
  airzoneGroups = {};
  airzoneCounts = {};
  const ensure = (type) => {
    if (!airzoneGroups[type]) { airzoneGroups[type] = L.layerGroup().addTo(map); airzoneCounts[type] = 0; }
    return airzoneGroups[type];
  };
  for (const z of airzoneZones) { // polygons → unified aggregate click
    const layer = L.polygon(z.rings, { color: z.color, weight: 1, fillColor: z.color, fillOpacity: 0.2 });
    layer.on("click", onZoneClick);
    ensure(z.type).addLayer(layer); airzoneCounts[z.type]++;
  }
  for (const z of airzoneLines) { // lines → own popup (not area-clickable)
    const layer = L.polyline(z.latlngs, { color: z.color, weight: 2 });
    layer.bindPopup(airzonePopupHtml(z));
    ensure(z.type).addLayer(layer); airzoneCounts[z.type]++;
  }
  rebuildControl(); // groups are on the map (on by default); control reflects current state
}

// --- Data loading ---
function jsonFromZip(buf) {
  const files = window.fflate.unzipSync(new Uint8Array(buf));
  const name = Object.keys(files).find((n) => n.toLowerCase().endsWith(".json"));
  if (!name) throw new Error("No .json entry inside the zip");
  return JSON.parse(new TextDecoder("utf-8").decode(files[name]));
}

async function loadEd269() {
  setStatus("Loading ED-269 zones…");
  const res = await fetch(ED269_URL, { cache: "no-store" });
  if (!res.ok) throw new Error(`ED-269 fetch ${res.status}`);
  render(jsonFromZip(await res.arrayBuffer()));
}

async function loadFromFile(file) {
  setStatus(`Reading ${file.name}…`);
  const buf = await file.arrayBuffer();
  const data = file.name.toLowerCase().endsWith(".zip")
    ? jsonFromZip(buf)
    : JSON.parse(new TextDecoder("utf-8").decode(new Uint8Array(buf)));
  render(data);
}

// --- Wire up UI ---
document.getElementById("reload").addEventListener("click", () => {
  loadEd269().catch((e) => setStatus(`Reload failed: ${e.message}`, true));
});
document.getElementById("file").addEventListener("change", (e) => {
  const f = e.target.files[0];
  if (f) loadFromFile(f).catch((err) => setStatus(`Could not read file: ${err.message}`, true));
});

// Drag & drop anywhere on the page.
let dragDepth = 0;
window.addEventListener("dragenter", (e) => { e.preventDefault(); if (dragDepth++ === 0) document.body.classList.add("dragging"); });
window.addEventListener("dragover", (e) => e.preventDefault());
window.addEventListener("dragleave", (e) => { e.preventDefault(); if (--dragDepth <= 0) { dragDepth = 0; document.body.classList.remove("dragging"); } });
window.addEventListener("drop", (e) => {
  e.preventDefault(); dragDepth = 0; document.body.classList.remove("dragging");
  const f = e.dataTransfer.files[0];
  if (f) loadFromFile(f).catch((err) => setStatus(`Could not read file: ${err.message}`, true));
});

// --- Initial load ---
loadEd269().catch((e) =>
  setStatus(`ED-269 auto-load failed (${e.message}). Drop a .zip/.json or click "Open file…".`, true));
loadAirzones(); // 2nd layer, independent of the ED-269 source
</script>
</body>
</html>
